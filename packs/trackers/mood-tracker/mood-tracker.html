<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker — Bubblegum Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   MOOD TRACKER v3 — Bubblegum Edition
   Design: Pop Retro meets Soft UI — playful pink palette
   Typography: Poppins (body) + Lora (headings) + Fira Code (mono)

   Structure:
   ✦ Header gradient + title + Month/Year card
   ✦ SVG mood legend (5 faces, colored dots)
   ✦ 7×5 calendar grid (Mon–Sun, days 1–31)
   ✦ Monthly summary — 2 side-by-side cards
   ✦ Quote footer
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens (Bubblegum) ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --foreground-secondary: #5b3050;
  --muted-foreground: #8b5070;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --muted-bg: #f8d8ea;
  --accent: #d09030;
  --accent-soft: rgba(208, 144, 48, 0.12);
  --amber: #D97706;
  --amber-soft: rgba(217, 119, 6, 0.1);
  --border: #d88ab0;
  --input: #e8c0d4;
  --dots: #d4a0c0;

  /* Mood face colors */
  --mood-awful: #c0408a;
  --mood-low: #D97706;
  --mood-meh: #d4a0c0;
  --mood-good: #8acfd1;
  --mood-great: #059669;

  /* Bubblegum fonts */
  --font-sans: 'Poppins', sans-serif;
  --font-serif: 'Lora', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing scale */
  --s1: 1.5mm;
  --s2: 2.5mm;
  --s3: 4mm;
  --s4: 6mm;
  --s5: 8mm;

  /* Pop shadow — the bubblegum signature */
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --shadow-inset: inset 0 1px 2px rgba(192, 64, 138, 0.08);
  --radius: 6px;
  --radius-sm: 4px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 7.5pt;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Page Container ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  overflow: hidden;
  box-shadow: 0 4px 30px rgba(192, 64, 138, 0.15);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page {
    margin: 0;
    box-shadow: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Card Base ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1.5px solid var(--border);
}

/* ─── SVG icon base ─── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon svg { display: block; }

/* ─── Dotted Write Line (6.5mm height) ─── */
.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 6.5mm;
  width: 100%;
}

/* ═══════════════════════════════════════
   SECTION 1: HEADER
   ═══════════════════════════════════════ */
.header-gradient {
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--primary) 0%, #e670ab 30%, var(--secondary) 60%, #d09030 100%);
  border-radius: 3px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header-left .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.header-left .subtitle {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 6.5pt;
  color: var(--muted);
  margin-top: 0.5mm;
}

/* Month / Year card */
.date-card {
  padding: var(--s2) var(--s3);
  display: flex;
  align-items: center;
  gap: var(--s4);
}
.date-group { display: flex; align-items: center; gap: 1.5mm; }
.date-label {
  font-size: 6.5pt;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-foreground);
}
.date-field {
  border-bottom: 1.5px solid var(--border);
  min-width: 22mm;
  height: 4.5mm;
  display: inline-block;
}
.date-field.narrow { min-width: 14mm; }

/* ═══════════════════════════════════════
   SECTION 2: MOOD LEGEND
   ═══════════════════════════════════════ */
.mood-legend {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5mm;
  padding: var(--s2) 0;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 1.5mm;
  font-size: 6.5pt;
  font-weight: 500;
  color: var(--foreground-secondary);
}

.legend-face {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.legend-dot {
  width: 3.5mm;
  height: 3.5mm;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   SECTION 3: CALENDAR GRID (7 cols × 5 rows)
   ═══════════════════════════════════════ */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1mm;
  flex: 1;
  min-height: 0;
}

.cal-header {
  background: var(--primary);
  color: #ffffff;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 6pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
  padding: 1.5mm 0;
  border-radius: var(--radius-sm);
}

.day-cell {
  background: var(--card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 1mm 1.2mm;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 0;
}

.day-num {
  font-family: var(--font-mono);
  font-size: 5.5pt;
  font-weight: 500;
  color: var(--muted-foreground);
  align-self: flex-start;
  line-height: 1;
}

.mood-circle {
  width: 9mm;
  height: 9mm;
  border-radius: 50%;
  border: 1.5px solid var(--input);
  background: var(--background);
  margin: auto 0;
  flex-shrink: 0;
}

.day-notes {
  width: 100%;
  border-bottom: 0.5px dotted var(--dots);
  height: 2.5mm;
  margin-top: auto;
}

/* Empty cells */
.day-cell.empty {
  background: transparent;
  border: none;
  box-shadow: none;
}

/* ═══════════════════════════════════════
   SECTION 4: MONTHLY SUMMARY
   ═══════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-top: var(--s3);
  margin-bottom: var(--s2);
  flex-shrink: 0;
}

.section-bar {
  width: 3mm;
  height: 3mm;
  border-radius: 1mm;
  flex-shrink: 0;
}

.section-title {
  font-family: var(--font-sans);
  font-size: 7pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--foreground);
}

.summary-row {
  display: flex;
  gap: var(--s3);
  flex-shrink: 0;
}

.summary-left, .summary-right {
  flex: 1;
  padding: var(--s3);
}

/* Summary fields */
.summary-field {
  display: flex;
  align-items: baseline;
  gap: 2mm;
  font-size: 7pt;
  color: var(--foreground-secondary);
  margin-bottom: 2mm;
}
.summary-field label {
  font-weight: 600;
  white-space: nowrap;
  font-size: 6.5pt;
}
.summary-field .field-val {
  flex: 1;
  border-bottom: 1.5px solid var(--border);
  height: 5mm;
}

/* Right card — pattern/trigger labels */
.patterns-label {
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 6.5pt;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--foreground-secondary);
  margin-bottom: var(--s1);
}

/* ═══════════════════════════════════════
   SECTION 5: FOOTER
   ═══════════════════════════════════════ */
.footer {
  border-top: 1.5px solid var(--border);
  padding-top: var(--s2);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-shrink: 0;
  margin-top: auto;
  text-align: center;
}

.footer-quote {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 6.5pt;
  color: var(--muted);
}

.footer-quote .author {
  font-style: normal;
  font-weight: 500;
}
</style>
</head>
<body>

<div class="page">

  <!-- ═══════════════════════════════════════════════
       1. HEADER — Gradient + Title + Month/Year
       ═══════════════════════════════════════════════ -->
  <div class="header-gradient" aria-hidden="true"></div>

  <div class="header">
    <div class="header-left">
      <div class="title">Mood Tracker</div>
      <div class="subtitle">Notice patterns. Understand yourself.</div>
    </div>
    <div class="date-card card">
      <div class="date-group">
        <span class="date-label">Month</span>
        <span class="date-field"></span>
      </div>
      <div class="date-group">
        <span class="date-label">Year</span>
        <span class="date-field narrow"></span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       2. MOOD LEGEND — 5 SVG faces + colored dots
       ═══════════════════════════════════════════════ -->
  <div class="mood-legend">

    <!-- Awful -->
    <div class="legend-item">
      <span class="legend-face">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#c0408a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="7.5"/>
          <circle cx="6.5" cy="7.5" r="0.7" fill="#c0408a" stroke="none"/>
          <circle cx="11.5" cy="7.5" r="0.7" fill="#c0408a" stroke="none"/>
          <path d="M6 13.5c.8-1.5 1.8-2 3-2s2.2.5 3 2"/>
        </svg>
      </span>
      <span class="legend-dot" style="background: var(--mood-awful);"></span>
      <span>Awful</span>
    </div>

    <!-- Low -->
    <div class="legend-item">
      <span class="legend-face">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#D97706" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="7.5"/>
          <circle cx="6.5" cy="7.5" r="0.7" fill="#D97706" stroke="none"/>
          <circle cx="11.5" cy="7.5" r="0.7" fill="#D97706" stroke="none"/>
          <path d="M6.5 12.8c.7-.9 1.5-1.3 2.5-1.3s1.8.4 2.5 1.3"/>
        </svg>
      </span>
      <span class="legend-dot" style="background: var(--mood-low);"></span>
      <span>Low</span>
    </div>

    <!-- Meh -->
    <div class="legend-item">
      <span class="legend-face">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#d4a0c0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="7.5"/>
          <circle cx="6.5" cy="7.5" r="0.7" fill="#d4a0c0" stroke="none"/>
          <circle cx="11.5" cy="7.5" r="0.7" fill="#d4a0c0" stroke="none"/>
          <line x1="6.5" y1="12" x2="11.5" y2="12"/>
        </svg>
      </span>
      <span class="legend-dot" style="background: var(--mood-meh);"></span>
      <span>Meh</span>
    </div>

    <!-- Good -->
    <div class="legend-item">
      <span class="legend-face">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#8acfd1" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="7.5"/>
          <circle cx="6.5" cy="7.5" r="0.7" fill="#8acfd1" stroke="none"/>
          <circle cx="11.5" cy="7.5" r="0.7" fill="#8acfd1" stroke="none"/>
          <path d="M6.5 11c.7.9 1.5 1.3 2.5 1.3s1.8-.4 2.5-1.3"/>
        </svg>
      </span>
      <span class="legend-dot" style="background: var(--mood-good);"></span>
      <span>Good</span>
    </div>

    <!-- Great -->
    <div class="legend-item">
      <span class="legend-face">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#059669" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="7.5"/>
          <circle cx="6.5" cy="7.5" r="0.7" fill="#059669" stroke="none"/>
          <circle cx="11.5" cy="7.5" r="0.7" fill="#059669" stroke="none"/>
          <path d="M5.5 10.5c1 1.8 2.2 2.5 3.5 2.5s2.5-.7 3.5-2.5"/>
        </svg>
      </span>
      <span class="legend-dot" style="background: var(--mood-great);"></span>
      <span>Great</span>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       3. CALENDAR GRID — 7 cols × 5 rows + headers
       ═══════════════════════════════════════════════ -->
  <div class="calendar-grid">

    <!-- Day-of-week headers -->
    <div class="cal-header">Mon</div>
    <div class="cal-header">Tue</div>
    <div class="cal-header">Wed</div>
    <div class="cal-header">Thu</div>
    <div class="cal-header">Fri</div>
    <div class="cal-header">Sat</div>
    <div class="cal-header">Sun</div>

    <!-- Row 1: Days 1–7 -->
    <div class="day-cell"><span class="day-num">1</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">2</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">3</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">4</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">5</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">6</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">7</span><div class="mood-circle"></div><div class="day-notes"></div></div>

    <!-- Row 2: Days 8–14 -->
    <div class="day-cell"><span class="day-num">8</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">9</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">10</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">11</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">12</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">13</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">14</span><div class="mood-circle"></div><div class="day-notes"></div></div>

    <!-- Row 3: Days 15–21 -->
    <div class="day-cell"><span class="day-num">15</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">16</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">17</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">18</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">19</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">20</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">21</span><div class="mood-circle"></div><div class="day-notes"></div></div>

    <!-- Row 4: Days 22–28 -->
    <div class="day-cell"><span class="day-num">22</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">23</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">24</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">25</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">26</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">27</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">28</span><div class="mood-circle"></div><div class="day-notes"></div></div>

    <!-- Row 5: Days 29–31 + 4 empty cells -->
    <div class="day-cell"><span class="day-num">29</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">30</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell"><span class="day-num">31</span><div class="mood-circle"></div><div class="day-notes"></div></div>
    <div class="day-cell empty"></div>
    <div class="day-cell empty"></div>
    <div class="day-cell empty"></div>
    <div class="day-cell empty"></div>

  </div>

  <!-- ═══════════════════════════════════════════════
       4. MONTHLY SUMMARY — 2 side-by-side cards
       ═══════════════════════════════════════════════ -->
  <div class="section-header">
    <div class="section-bar" style="background: var(--secondary);"></div>
    <span class="section-title">Monthly Summary</span>
  </div>

  <div class="summary-row">

    <!-- Left card: Average / Best / Hardest -->
    <div class="summary-left card">
      <div class="summary-field">
        <label>Average mood:</label>
        <span class="field-val"></span>
      </div>
      <div class="summary-field">
        <label>Best day:</label>
        <span class="field-val"></span>
      </div>
      <div class="summary-field">
        <label>Hardest day:</label>
        <span class="field-val"></span>
      </div>
    </div>

    <!-- Right card: Patterns / Triggers -->
    <div class="summary-right card">
      <div class="patterns-label">Patterns &amp; Triggers</div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       5. FOOTER — Quote
       ═══════════════════════════════════════════════ -->
  <div class="footer">
    <span class="footer-quote">"Feelings are just visitors. Let them come and go." <span class="author">— Mooji</span></span>
  </div>

</div>

</body>
</html>
