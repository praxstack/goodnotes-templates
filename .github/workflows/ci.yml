name: CI

# FIND-0008: gate PR merges on build + test + audit. The existing generate.yml
# only runs on push to main; nothing caught broken builds, failing tests, or
# new HIGH CVEs before they reached main. This workflow runs on every PR.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build · Test · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # FIND-0009: pin actions by full commit SHA + dependabot group (see
      # .github/dependabot.yml). Comments record the human-readable tag.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (exact lockfile)
        run: npm ci

      # FIND-I4-001 (iter-4): hard PR gate that blocks the exact failure
      # mode that shipped real PII to a public repo. Any non-example
      # profile.*.json appearing in the git index fails the job before
      # it costs build minutes. Belt-and-braces vs. the vitest guard
      # (`profile.test.ts` asserts the same thing); this step runs
      # earlier and is obvious in the PR status.
      - name: No-PII gate (FIND-I4-001)
        run: |
          set -euo pipefail
          leaked=$(git ls-files | grep -E '(^|/)profile\..+\.json$' | grep -v -E '(^|/)profile\.example\.json$' || true)
          if [ -n "$leaked" ]; then
            echo "::error::FIND-I4-001 · profile.*.json files tracked in git:"
            echo "$leaked" | sed 's|^|  • |'
            echo ""
            echo "These must live only on disk (gitignored). See"
            echo "audit/iteration-4/findings.md FIND-I4-001."
            exit 1
          fi
          echo "no-PII gate: OK (no profile.*.json other than profile.example.json is tracked)"

      - name: TypeScript build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage gate
        run: npm test -- --run --coverage

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 30
