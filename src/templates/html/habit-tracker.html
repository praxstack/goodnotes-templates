<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_base.css" />
  <style>
    /* ═══════════════════════════════════════════════
       Habit Tracker — template-specific styles
       ═══════════════════════════════════════════════ */

    /* ─── Month/Year row ─── */
    .month-row {
      display: flex;
      align-items: center;
      gap: 6mm;
      padding: var(--s2) 0;
      border-bottom: 0.3px solid var(--border);
      margin-bottom: var(--s3);
      flex-shrink: 0;
      font-size: 7.5pt;
      color: var(--muted-foreground);
    }
    .month-row label {
      font-weight: 500;
    }
    .month-row .field {
      border-bottom: 0.5px solid var(--border);
      min-width: 28mm;
      height: 4.5mm;
      display: inline-block;
    }
    .month-row .field.narrow {
      min-width: 16mm;
    }

    /* ─── Habit Grid ─── */
    .habit-grid-wrapper {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .habit-grid {
      width: 182mm;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .habit-grid thead th {
      font-family: var(--font-mono);
      font-size: 5pt;
      font-weight: 500;
      color: var(--muted-foreground);
      text-align: center;
      padding: 1mm 0;
      border-bottom: 0.5px solid var(--border);
    }
    .habit-grid thead th.col-habit {
      width: 40mm;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 6pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--foreground-secondary);
    }
    .habit-grid thead th.col-day {
      width: 4mm;
    }
    .habit-grid thead th.col-total {
      width: 10mm;
      font-family: var(--font-sans);
      font-size: 6pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--foreground-secondary);
    }

    .habit-grid tbody tr {
      height: 5.5mm;
    }
    .habit-grid tbody tr:nth-child(even) {
      background: var(--card);
    }

    .habit-grid tbody td {
      padding: 0;
      text-align: center;
      vertical-align: middle;
      border-bottom: 0.3px dotted var(--input);
    }
    .habit-grid tbody td.cell-habit {
      text-align: left;
      padding-left: 1mm;
    }
    .habit-grid tbody td.cell-total {
      border-left: 0.5px solid var(--border);
    }

    /* Habit name write-in line */
    .habit-name-line {
      border-bottom: 0.5px dotted var(--input);
      display: block;
      width: 36mm;
      height: 3.5mm;
    }

    /* Checkbox square */
    .day-box {
      width: 3.5mm;
      height: 3.5mm;
      border: 0.4px solid var(--border);
      border-radius: 0.5mm;
      display: inline-block;
      background: var(--background);
    }
    .habit-grid tbody tr:nth-child(even) .day-box {
      background: var(--card);
    }

    /* Total field */
    .total-field {
      border-bottom: 0.5px dotted var(--input);
      display: inline-block;
      width: 7mm;
      height: 3.5mm;
    }

    /* ─── Streak Counter ─── */
    .streak-section {
      display: flex;
      align-items: center;
      gap: 6mm;
      padding: var(--s3) 0;
      border-top: 0.5px solid var(--border);
      margin-top: var(--s3);
      flex-shrink: 0;
      font-size: 7pt;
      color: var(--foreground-secondary);
    }
    .streak-section .streak-label {
      font-weight: 600;
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted-foreground);
    }
    .streak-section .streak-field {
      border-bottom: 0.5px solid var(--border);
      min-width: 14mm;
      height: 4mm;
      display: inline-block;
    }
    .streak-section .streak-item {
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }
    .streak-section .streak-dot {
      width: 2.5mm;
      height: 2.5mm;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .streak-section .streak-dot.green {
      background: var(--green);
    }
    .streak-section .streak-dot.accent {
      background: var(--accent);
    }
    .streak-section .streak-dot.blue {
      background: var(--blue);
    }

    /* ─── Print ─── */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @media print {
      body { background: white; }
      .page { margin: 0; box-shadow: none; }
    }
  </style>
