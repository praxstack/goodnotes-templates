<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Card — Bubblegum v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   RECIPE CARD — Bubblegum v3
   Self-contained: all palette + base styles baked in
   Typography: Poppins + Lora + Fira Code
   A4 portrait · 12 mm margins
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --accent: #d09030;
  --border: #d88ab0;
  --dots: #d4a0c0;
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --radius: 6px;

  /* Typography */
  --font-sans: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  --font-serif: 'Lora', Georgia, 'Times New Roman', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing */
  --s1: 2mm; --s2: 3mm; --s3: 5mm; --s4: 7mm; --s5: 10mm; --s6: 14mm;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 8pt;
  font-weight: 400;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ─── Page ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(192, 64, 138, 0.12);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page { margin: 0; box-shadow: none; }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Header ─── */
.header-bar {
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 50%, var(--secondary) 100%);
  border-radius: 2px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 600;
  color: var(--foreground);
  line-height: 1.1;
}

.header .subtitle {
  font-family: var(--font-sans);
  font-weight: 300;
  font-style: italic;
  font-size: 7.5pt;
  color: var(--muted);
  margin-top: 1.5mm;
}

.date-block { text-align: right; padding-top: 1mm; }
.date-label {
  font-family: var(--font-mono);
  font-size: 6pt;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 1mm;
}
.date-field {
  border-bottom: 1px solid var(--border);
  min-width: 28mm;
  height: 5mm;
  display: inline-block;
}

/* ─── Section labels ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
  margin-top: var(--s4);
}
.section-label.no-top { margin-top: 0; }

.section-dot {
  width: 3mm; height: 3mm; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}
.section-dot.teal { background: var(--secondary); }
.section-dot.gold { background: var(--accent); }

.section-title {
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--foreground);
}

/* ─── Icon ─── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--primary); }
.icon svg { display: block; }

/* ─── Write line ─── */
.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 5mm;
  margin-bottom: 1mm;
}

/* ─── Card ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s2) var(--s3);
}
.card.alt { background: var(--card-alt); }
.card.teal-soft { background: rgba(138,207,209,0.12); border-color: rgba(138,207,209,0.4); }

/* ─── Recipe Name + Source ─── */
.recipe-header {
  margin-bottom: var(--s3);
}
.recipe-field {
  display: flex;
  align-items: baseline;
  gap: 2mm;
  margin-bottom: var(--s1);
}
.recipe-field label {
  font-weight: 600;
  font-size: 7.5pt;
  color: var(--foreground);
  white-space: nowrap;
}
.recipe-field label.large {
  font-size: 9pt;
  font-family: var(--font-serif);
}
.recipe-field .field-line {
  flex: 1;
  border-bottom: 0.5px solid var(--border);
  height: 5mm;
  display: inline-block;
}

/* ─── Info row (Prep/Cook/Servings/Difficulty) ─── */
.info-row {
  display: flex;
  gap: var(--s2);
  margin-bottom: var(--s3);
}
.info-card {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s1) var(--s2);
  text-align: center;
}
.info-card .info-icon {
  display: flex;
  justify-content: center;
  margin-bottom: 1mm;
  color: var(--primary);
}
.info-card label {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 5.5pt;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  display: block;
  margin-bottom: 1mm;
}
.info-card .info-field {
  border-bottom: 0.5px dotted var(--dots);
  height: 4.5mm;
  width: 80%;
  margin: 0 auto;
}

/* ─── Ingredients (2 columns × 8 items) ─── */
.ingredients-grid {
  display: flex;
  gap: var(--s4);
  margin-bottom: var(--s2);
}
.ingredients-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.ingredient-item {
  display: flex;
  align-items: center;
  gap: 2mm;
  height: 5.5mm;
}
.ingredient-item .cb-box {
  width: 3mm;
  height: 3mm;
  border: 0.5px solid var(--border);
  border-radius: 0.6mm;
  flex-shrink: 0;
  background: var(--background);
}
.ingredient-item .line {
  flex: 1;
  border-bottom: 0.4px dotted var(--dots);
  height: 3.5mm;
}

/* ─── Directions (8 numbered steps) ─── */
.directions-list {
  flex: 1;
  min-height: 0;
}
.direction-item {
  display: flex;
  gap: 2mm;
  align-items: flex-start;
  margin-bottom: var(--s1);
}
.step-num {
  width: 5mm;
  height: 5mm;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6pt;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 0.3mm;
}
.direction-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.direction-lines .write-line {
  height: 4.5mm;
  margin-bottom: 0;
}

/* ─── Notes card ─── */
.notes-card {
  margin-top: var(--s2);
}

/* ─── Footer ─── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: var(--s3);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.footer-brand {
  font-family: var(--font-mono);
  font-size: 6pt;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.footer-page {
  font-family: var(--font-mono);
  font-size: 6.5pt;
  color: var(--muted);
}
</style>
</head>
