<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_base.css" />
  <style>
    /* ═══════════════════════════════════════════════
       Fitness Log — template-specific styles
       ═══════════════════════════════════════════════ */

    /* ─── Workout Card ─── */
    .workout-card {
      display: flex;
      align-items: center;
      gap: var(--s4);
      flex-wrap: wrap;
    }
    .workout-field {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      font-size: 7.5pt;
      color: var(--foreground-secondary);
    }
    .workout-field label {
      font-weight: 500;
      white-space: nowrap;
    }
    .workout-field .field-val {
      border-bottom: 0.5px solid var(--border);
      min-width: 28mm;
      height: 4.5mm;
      display: inline-block;
    }
    .workout-field .field-val.narrow {
      min-width: 18mm;
    }

    /* ─── Exercise Table — mono numbers ─── */
    .grid-table td:not(:first-child) {
      font-family: var(--font-mono);
      font-size: 6.5pt;
    }

    /* ─── Cardio Card ─── */
    .cardio-fields {
      display: flex;
      gap: var(--s4);
      flex-wrap: wrap;
    }
    .cardio-field {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      font-size: 7pt;
      color: var(--foreground-secondary);
    }
    .cardio-field label {
      font-weight: 500;
      white-space: nowrap;
    }
    .cardio-field .field-val {
      border-bottom: 0.5px solid var(--border);
      min-width: 18mm;
      height: 4mm;
      display: inline-block;
    }

    /* ─── Body Stats ─── */
    .stats-cols {
      display: flex;
      gap: var(--s4);
    }
    .stats-col {
      flex: 1;
    }
    .stat-field {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      font-size: 7pt;
      color: var(--foreground-secondary);
      margin-bottom: 1.5mm;
    }
    .stat-field label {
      font-weight: 500;
      white-space: nowrap;
      min-width: 16mm;
    }
    .stat-field .field-val {
      flex: 1;
      border-bottom: 0.5px solid var(--border);
      height: 4mm;
    }

    /* ─── Water Circles ─── */
    .water-row {
      display: flex;
      align-items: center;
      gap: 2mm;
      margin-bottom: 2mm;
    }
    .water-row label {
      font-weight: 500;
      font-size: 7pt;
      color: var(--foreground-secondary);
      white-space: nowrap;
      min-width: 16mm;
    }
    .water-circles {
      display: flex;
      gap: 1.5mm;
    }
    .water-circle {
      width: 4.5mm;
      height: 4.5mm;
      border-radius: 50%;
      border: 0.5px solid var(--blue);
      background: var(--background);
      flex-shrink: 0;
    }

    /* ─── Energy Scale ─── */
    .energy-row {
      display: flex;
      align-items: center;
      gap: var(--s3);
    }
    .energy-label {
      font-weight: 700;
      font-size: 7pt;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--foreground-secondary);
      white-space: nowrap;
    }
    .energy-scale {
      display: flex;
      align-items: center;
      gap: 2mm;
    }
    .energy-num {
      font-family: var(--font-mono);
      font-size: 6pt;
      color: var(--muted-foreground);
    }
    .energy-circle {
      width: 5mm;
      height: 5mm;
      border-radius: 50%;
      border: 0.5px solid var(--border);
      background: var(--background);
      flex-shrink: 0;
    }
    .energy-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5mm;
    }
    .energy-endpoint {
      font-size: 5.5pt;
      color: var(--muted-foreground);
      white-space: nowrap;
    }
    .notes-inline {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      flex: 1;
    }
    .notes-inline label {
      font-weight: 500;
      font-size: 7pt;
      color: var(--foreground-secondary);
      white-space: nowrap;
    }

    /* ─── Feel Section ─── */
    .feel-section {
      margin-top: var(--s2);
    }
    .feel-notes {
      margin-top: var(--s1);
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- ══════════════════════════════════════════════════════════
         1. HEADER
         ══════════════════════════════════════════════════════════ -->
    <header class="page-header">
      <div>
        <div class="page-title">Fitness Log</div>
        <div class="page-subtitle">Show up. Put in the work. Results follow.</div>
      </div>
    </header>

    <!-- ══════════════════════════════════════════════════════════
         2. DATE ROW
         ══════════════════════════════════════════════════════════ -->
    <div class="date-row">
      <label>Day:</label><span class="field"></span>
      <label>Week:</label><span class="field"></span>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         3. WORKOUT SECTION
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label no-top">
      <div class="section-dot green"></div>
      <div class="section-title">Workout</div>
    </div>

    <div class="card green-soft">
      <div class="workout-card">
        <div class="workout-field">
          <label>Type:</label>
          <span class="field-val">
            <span style="font-size:6pt; color:var(--muted-foreground); font-family:var(--font-mono);">Strength / Cardio / Flexibility / Sport</span>
          </span>
        </div>
        <div class="workout-field">
          <label>Duration:</label>
          <span class="field-val narrow"></span>
        </div>
        <div class="workout-field">
          <span class="cb">Warm-up</span>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         4. EXERCISES TABLE
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <div class="section-dot"></div>
      <div class="section-title">Exercises</div>
    </div>

    <table class="grid-table">
      <thead>
        <tr>
          <th style="width:32%;">Exercise Name</th>
          <th>Sets</th>
          <th>Reps</th>
          <th>Weight</th>
          <th>Rest</th>
          <th style="width:20%;">Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>

    <!-- ══════════════════════════════════════════════════════════
         5. CARDIO
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <div class="section-dot blue"></div>
      <div class="section-title">Cardio</div>
    </div>

    <div class="card">
      <div class="cardio-fields">
        <div class="cardio-field"><label>Activity:</label><span class="field-val"></span></div>
        <div class="cardio-field"><label>Duration:</label><span class="field-val"></span></div>
        <div class="cardio-field"><label>Distance:</label><span class="field-val"></span></div>
        <div class="cardio-field"><label>Heart Rate:</label><span class="field-val"></span></div>
        <div class="cardio-field"><label>Calories:</label><span class="field-val"></span></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         6. BODY STATS (2-column)
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <div class="section-dot amber"></div>
      <div class="section-title">Body Stats</div>
    </div>

    <div class="stats-cols">
      <!-- Left column: measurements -->
      <div class="stats-col">
        <div class="stat-field"><label>Weight:</label><span class="field-val"></span></div>
        <div class="stat-field"><label>Body Fat %:</label><span class="field-val"></span></div>
        <div class="stat-field"><label>Chest:</label><span class="field-val"></span></div>
        <div class="stat-field"><label>Waist:</label><span class="field-val"></span></div>
        <div class="stat-field"><label>Hips:</label><span class="field-val"></span></div>
      </div>

      <!-- Right column: wellness -->
      <div class="stats-col">
        <div class="water-row">
          <label>Water:</label>
          <div class="water-circles">
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
            <span class="water-circle"></span>
          </div>
        </div>
        <div class="stat-field"><label>Sleep:</label><span class="field-val"></span></div>
        <div class="stat-field"><label>Steps:</label><span class="field-val"></span></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         7. HOW I FEEL
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <div class="section-dot green"></div>
      <div class="section-title">How I Feel</div>
    </div>

    <div class="feel-section">
      <div class="energy-row">
        <span class="energy-label">Energy:</span>
        <div class="energy-scale">
          <span class="energy-endpoint">Low</span>
          <div class="energy-item"><span class="energy-circle"></span><span class="energy-num">1</span></div>
          <div class="energy-item"><span class="energy-circle"></span><span class="energy-num">2</span></div>
          <div class="energy-item"><span class="energy-circle"></span><span class="energy-num">3</span></div>
          <div class="energy-item"><span class="energy-circle"></span><span class="energy-num">4</span></div>
          <div class="energy-item"><span class="energy-circle"></span><span class="energy-num">5</span></div>
          <span class="energy-endpoint">High</span>
        </div>
        <div class="notes-inline">
          <label>Notes:</label>
        </div>
      </div>
      <div class="feel-notes">
        <div class="write-line"></div>
        <div class="write-line"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         8. QUOTE BANNER
         ══════════════════════════════════════════════════════════ -->
    <div class="quote-banner">
      <div class="quote-text">"The only bad workout is the one that didn't happen."</div>
      <div class="quote-author">— Unknown</div>
    </div>

  </div>

</body>
</html>
