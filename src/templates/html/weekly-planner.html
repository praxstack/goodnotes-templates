<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner — Bubblegum v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   WEEKLY PLANNER — Bubblegum v3
   Self-contained: all palette + base styles baked in
   Typography: Poppins + Lora + Fira Code
   A4 portrait · 12 mm margins
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --accent: #d09030;
  --border: #d88ab0;
  --dots: #d4a0c0;
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --radius: 6px;

  /* Typography */
  --font-sans: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  --font-serif: 'Lora', Georgia, 'Times New Roman', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing */
  --s1: 2mm; --s2: 3mm; --s3: 5mm; --s4: 7mm; --s5: 10mm; --s6: 14mm;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 8pt;
  font-weight: 400;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ─── Page ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(192, 64, 138, 0.12);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page { margin: 0; box-shadow: none; }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Header ─── */
.header-bar {
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 50%, var(--secondary) 100%);
  border-radius: 2px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s2);
  flex-shrink: 0;
}

.header .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 600;
  color: var(--foreground);
  line-height: 1.1;
}

.header .subtitle {
  font-family: var(--font-sans);
  font-weight: 300;
  font-style: italic;
  font-size: 7.5pt;
  color: var(--muted);
  margin-top: 1.5mm;
}

/* ─── Week-of field ─── */
.week-row {
  display: flex;
  align-items: center;
  gap: 4mm;
  padding: var(--s2) 0;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: var(--s2);
  flex-shrink: 0;
  font-size: 7.5pt;
  color: var(--muted);
}
.week-row label {
  font-weight: 500;
  white-space: nowrap;
  font-family: var(--font-mono);
  font-size: 6.5pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.week-row .field {
  border-bottom: 0.5px solid var(--border);
  min-width: 28mm;
  height: 4.5mm;
  display: inline-block;
}

/* ─── Goals row ─── */
.goals-row {
  display: flex;
  align-items: center;
  gap: 3mm;
  padding: var(--s1) 0 var(--s2);
  flex-shrink: 0;
  font-size: 7.5pt;
  color: var(--foreground);
  border-bottom: 0.5px solid var(--border);
  margin-bottom: var(--s2);
}
.goals-label {
  font-family: var(--font-mono);
  font-size: 6.5pt;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--primary);
  white-space: nowrap;
}
.goal-item {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 1.5mm;
}
.goal-num {
  font-family: var(--font-serif);
  font-size: 9pt;
  color: var(--accent);
  flex-shrink: 0;
}
.goal-field {
  flex: 1;
  border-bottom: 0.5px dotted var(--dots);
  height: 4.5mm;
}

/* ─── Section labels ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
  margin-top: var(--s3);
}
.section-label.no-top { margin-top: 0; }

.section-dot {
  width: 3mm; height: 3mm; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}
.section-dot.teal { background: var(--secondary); }
.section-dot.gold { background: var(--accent); }

.section-title {
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--foreground);
}

/* ─── Icon ─── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--primary); }
.icon svg { display: block; }

/* ─── Write line ─── */
.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 5mm;
  margin-bottom: 0;
}

/* ─── Card ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s2) var(--s3);
}
.card.alt { background: var(--card-alt); }

/* ─── 7-Day Grid ─── */
.day-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.day-strip {
  display: flex;
  align-items: stretch;
  flex: 1;
  border-bottom: 0.4px solid var(--border);
  min-height: 0;
}
.day-strip:last-child { border-bottom: none; }

.day-label {
  width: 14mm;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 1mm 0;
}
.day-name {
  font-family: var(--font-serif);
  font-size: 8.5pt;
  font-weight: 600;
  color: var(--foreground);
  line-height: 1;
}
.day-date-field {
  font-family: var(--font-mono);
  font-size: 5pt;
  color: var(--muted);
  margin-top: 0.5mm;
}

.day-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 1mm 2mm;
  gap: 0;
}
.day-main .write-line {
  height: auto;
  flex: 1;
  min-height: 4mm;
}

.day-priority {
  width: 28mm;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 1.5mm 0 1.5mm 2mm;
  border-left: 0.4px dotted var(--dots);
}
.priority-label {
  font-family: var(--font-mono);
  font-size: 4.5pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin-bottom: 0.5mm;
}
.priority-field {
  border-bottom: 0.5px dotted var(--dots);
  height: 4.5mm;
  width: 100%;
}

/* Weekend shading */
.day-strip.weekend {
  background: rgba(138,207,209,0.06);
}

/* ─── Top 3 ─── */
.top3-section {
  flex-shrink: 0;
  margin-top: var(--s2);
}
.top3-items {
  display: flex;
  gap: 3mm;
  padding: var(--s1) 0;
}
.top3-item {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 2mm;
  font-size: 7.5pt;
}
.top3-num {
  font-family: var(--font-serif);
  font-size: 11pt;
  color: var(--accent);
  line-height: 1;
  flex-shrink: 0;
  width: 5mm;
  text-align: center;
}
.top3-line {
  flex: 1;
  border-bottom: 0.5px dotted var(--dots);
  height: 5mm;
}

/* ─── Notes ─── */
.notes-section {
  flex-shrink: 0;
  margin-top: var(--s2);
}

/* ─── Footer ─── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: var(--s3);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.footer-brand {
  font-family: var(--font-mono);
  font-size: 6pt;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.footer-page {
  font-family: var(--font-mono);
  font-size: 6.5pt;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="page">

  <!-- ══════════════════════════════════════════════
       1. HEADER + WEEK-OF
       ══════════════════════════════════════════════ -->
  <div class="header-bar"></div>
  <div class="header">
    <div>

      <div class="subtitle">Plan the week. Win each day.</div>

  </div>

  <div class="week-row">
    <span class="icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="11" height="10" rx="1.5"/><line x1="4.5" y1="1" x2="4.5" y2="4"/><line x1="9.5" y1="1" x2="9.5" y2="4"/><line x1="1.5" y1="5.5" x2="12.5" y2="5.5"/></svg></span>

      Goals
    </span>
    <div class="goal-item"><span class="goal-num">1.</span><span class="goal-field"></span></div>
