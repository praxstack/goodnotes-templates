<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_base.css" />
  <style>
    /* ═══════════════════════════════════════════════
       Weekly Planner — template-specific styles
       ═══════════════════════════════════════════════ */

    /* ─── Week-of / Goals row ─── */
    .week-row {
      display: flex;
      align-items: center;
      gap: 6mm;
      padding: var(--s2) 0;
      border-bottom: 0.3px solid var(--border);
      margin-bottom: var(--s3);
      flex-shrink: 0;
      font-size: 7.5pt;
      color: var(--muted-foreground);
    }
    .week-row label {
      font-weight: 500;
      white-space: nowrap;
    }
    .week-row .field {
      border-bottom: 0.5px solid var(--border);
      min-width: 28mm;
      height: 4.5mm;
      display: inline-block;
    }
    .goals-row {
      display: flex;
      align-items: center;
      gap: 5mm;
      padding: var(--s1) 0 var(--s2);
      flex-shrink: 0;
      font-size: 7.5pt;
      color: var(--muted-foreground);
      border-bottom: 0.3px solid var(--border);
      margin-bottom: var(--s3);
    }
    .goals-row label {
      font-weight: 500;
      white-space: nowrap;
    }
    .goals-row .cb {
      flex: 1;
    }

    /* ─── Day Grid ─── */
    .day-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .day-strip {
      display: flex;
      align-items: stretch;
      height: 30mm;
      border-bottom: 0.3px solid var(--border);
    }
    .day-strip:last-child {
      border-bottom: none;
    }
    .day-label {
      width: 15mm;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 2mm;
      font-family: var(--font-serif);
      font-size: 9pt;
      color: var(--foreground);
      letter-spacing: -0.01em;
    }
    .day-label .day-abbr {
      font-family: var(--font-mono);
      font-size: 5.5pt;
      color: var(--muted-foreground);
      margin-left: 0.5mm;
      align-self: flex-end;
      margin-bottom: 0.3mm;
    }
    .day-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1.5mm 2mm;
      gap: 0.5mm;
    }
    .day-main .write-line {
      height: 5.5mm;
      margin-bottom: 0;
    }
    .day-priority {
      width: 30mm;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 2mm 0 2mm 2mm;
      border-left: 0.3px dotted var(--input);
    }
    .day-priority .priority-label {
      font-family: var(--font-mono);
      font-size: 5pt;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 1mm;
    }
    .day-priority .priority-field {
      border-bottom: 0.5px dotted var(--input);
      height: 5mm;
      width: 100%;
    }

    /* Weekend compressed */
    .day-strip.weekend {
      background: var(--card);
    }

    /* ─── Top 3 Card ─── */
    .top3-section {
      margin-top: var(--s3);
      flex-shrink: 0;
    }
    .top3-items {
      display: flex;
      gap: 3mm;
    }
    .top3-item {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2mm;
      font-size: 7.5pt;
      color: var(--foreground-secondary);
    }
    .top3-num {
      font-family: var(--font-serif);
      font-size: 11pt;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
      width: 5mm;
      text-align: center;
    }
    .top3-line {
      flex: 1;
      border-bottom: 0.5px dotted var(--input);
      height: 5mm;
    }

    /* ─── Notes ─── */
    .notes-section {
      margin-top: var(--s3);
      flex-shrink: 0;
    }

    /* ─── Print ─── */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @media print {
      body { background: white; }
      .page { margin: 0; box-shadow: none; }
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- ══════════════════════════════════════════════════════════
         1. HEADER
         ══════════════════════════════════════════════════════════ -->
    <header class="page-header">
      <div>
        <div class="page-title">Weekly Planner</div>
        <div class="page-subtitle">Plan the week. Win each day.</div>
      </div>
    </header>

    <!-- ══════════════════════════════════════════════════════════
         2. WEEK-OF / GOALS ROW
         ══════════════════════════════════════════════════════════ -->
    <div class="week-row">
      <label>Week of:</label><span class="field"></span>
    </div>

    <div class="goals-row">
      <label>Goals:</label>
      <span class="cb"><span class="field-line wide"></span></span>
      <span class="cb"><span class="field-line wide"></span></span>
      <span class="cb"><span class="field-line wide"></span></span>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         3. 7-DAY GRID (Mon – Sun)
         ══════════════════════════════════════════════════════════ -->
    <div class="day-grid">

      <div class="day-strip">
        <div class="day-label">Mon</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip">
        <div class="day-label">Tue</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip">
        <div class="day-label">Wed</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip">
        <div class="day-label">Thu</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip">
        <div class="day-label">Fri</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip weekend">
        <div class="day-label">Sat</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

      <div class="day-strip weekend">
        <div class="day-label">Sun</div>
        <div class="day-main">
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
          <div class="write-line"></div>
        </div>
        <div class="day-priority">
          <div class="priority-label">Top Priority</div>
          <div class="priority-field"></div>
        </div>
      </div>

    </div>

    <!-- ══════════════════════════════════════════════════════════
         4. TOP 3 THIS WEEK
         ══════════════════════════════════════════════════════════ -->
    <div class="top3-section">
      <div class="section-label">
        <span class="section-dot"></span>
        <span class="section-title">Top 3 This Week</span>
      </div>
      <div class="card accent-soft">
        <div class="top3-items">
          <div class="top3-item"><span class="top3-num">1</span><span class="top3-line"></span></div>
          <div class="top3-item"><span class="top3-num">2</span><span class="top3-line"></span></div>
          <div class="top3-item"><span class="top3-num">3</span><span class="top3-line"></span></div>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         5. NOTES
         ══════════════════════════════════════════════════════════ -->
    <div class="notes-section">
      <div class="section-label">
        <span class="section-dot blue"></span>
        <span class="section-title">Notes</span>
      </div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
      <div class="write-line"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         6. QUOTE BANNER
         ══════════════════════════════════════════════════════════ -->
    <div class="quote-banner">
      <div class="quote-text">"Ordinary people think merely of spending time. Great people think of using it."</div>
      <div class="quote-author">— Arthur Schopenhauer</div>
    </div>

  </div>

</body>
</html>
