<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Log — Bubblegum v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   READING LOG — Bubblegum v3
   Self-contained: all palette + base styles baked in
   Typography: Poppins + Lora + Fira Code
   A4 portrait · 12 mm margins
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --accent: #d09030;
  --border: #d88ab0;
  --dots: #d4a0c0;
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --radius: 6px;

  /* Typography */
  --font-sans: 'Poppins', 'Segoe UI', system-ui, sans-serif;
  --font-serif: 'Lora', Georgia, 'Times New Roman', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing */
  --s1: 2mm; --s2: 3mm; --s3: 5mm; --s4: 7mm; --s5: 10mm; --s6: 14mm;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 8pt;
  font-weight: 400;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ─── Page ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(192, 64, 138, 0.12);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page { margin: 0; box-shadow: none; }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Header ─── */
.header-bar {
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 50%, var(--secondary) 100%);
  border-radius: 2px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 600;
  color: var(--foreground);
  letter-spacing: -0.01em;
  line-height: 1.1;
}

.header .subtitle {
  font-family: var(--font-sans);
  font-weight: 300;
  font-style: italic;
  font-size: 7.5pt;
  color: var(--muted);
  margin-top: 1.5mm;
}

.date-block { text-align: right; padding-top: 1mm; }
.date-label {
  font-family: var(--font-mono);
  font-size: 6pt;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 1mm;
}
.date-field {
  border-bottom: 1px solid var(--border);
  min-width: 28mm;
  height: 5mm;
  display: inline-block;
}

/* ─── Section labels ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
  margin-top: var(--s4);
}
.section-label.no-top { margin-top: 0; }

.section-dot {
  width: 3mm; height: 3mm; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}
.section-dot.teal { background: var(--secondary); }
.section-dot.gold { background: var(--accent); }

.section-title {
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--foreground);
}

/* ─── Icon helper ─── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--primary); }
.icon svg { display: block; }

/* ─── Write line ─── */
.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 5mm;
  margin-bottom: 1mm;
}

/* ─── Card ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s2) var(--s3);
}
.card.alt { background: var(--card-alt); }
.card.teal-soft { background: rgba(138,207,209,0.15); }

/* ─── Date row ─── */
.date-row {
  display: flex;
  align-items: center;
  gap: 6mm;
  padding: var(--s2) 0;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: var(--s3);
  flex-shrink: 0;
  font-size: 7.5pt;
  color: var(--muted);
}
.date-row label { font-weight: 500; white-space: nowrap; }
.date-row .field {
  border-bottom: 0.5px solid var(--border);
  min-width: 22mm;
  height: 4.5mm;
  display: inline-block;
}

/* ─── Currently Reading ─── */
.currently-reading {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s2) var(--s3);
  margin-bottom: var(--s3);
}
.cr-fields {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s1) var(--s4);
  font-size: 7.5pt;
  color: var(--foreground);
  align-items: baseline;
}
.cr-field {
  display: flex;
  align-items: baseline;
  gap: 1.5mm;
}
.cr-field label {
  font-weight: 500;
  font-size: 7pt;
  color: var(--muted);
  white-space: nowrap;
}
.cr-field .field {
  border-bottom: 0.5px solid var(--border);
  min-width: 18mm;
  height: 4.5mm;
  display: inline-block;
}
.cr-field .field.wide { min-width: 50mm; }
.cr-field .field.narrow { min-width: 10mm; }

/* Progress bar */
.progress-bar {
  display: flex;
  gap: 0;
  margin-top: var(--s2);
  height: 3mm;
  border-radius: 1.5mm;
  overflow: hidden;
  border: 0.5px solid var(--border);
}
.progress-segment {
  flex: 1;
  border-right: 0.4px solid var(--border);
  background: var(--background);
}
.progress-segment:last-child { border-right: none; }

/* ─── Book Log Table ─── */
.grid-table { width: 100%; border-collapse: collapse; font-size: 7pt; }
.grid-table th {
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  padding: 1.5mm 2mm;
  text-align: center;
  font-size: 6pt;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.grid-table th:first-child { text-align: left; border-radius: var(--radius) 0 0 var(--radius); }
.grid-table th:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.grid-table td {
  padding: 1.5mm 2mm;
  text-align: center;
  border-bottom: 0.4px dotted var(--dots);
}
.grid-table td:first-child { text-align: left; color: var(--muted); }
.grid-table tr:nth-child(even) { background: rgba(246,230,238,0.5); }
.grid-table .col-num { width: 5mm; }
.grid-table .col-title { width: 32mm; text-align: left; }
.grid-table .col-author { width: 26mm; text-align: left; }
.grid-table .col-date { width: 16mm; }
.grid-table .col-rating { width: 18mm; }
.grid-table .col-notes { text-align: left; }
.grid-table td.left { text-align: left; }
.stars { font-size: 7pt; color: var(--border); letter-spacing: 0.3mm; }

/* ─── Reading Stats ─── */
.stats-row {
  display: flex;
  gap: var(--s3);
  margin-top: var(--s2);
}
.stat-card {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: var(--s2) var(--s3);
}
.stat-card .stat-label {
  font-family: var(--font-mono);
  font-size: 6pt;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--primary);
  margin-bottom: 1mm;
}
.stat-item {
  display: flex;
  align-items: baseline;
  gap: 1.5mm;
  font-size: 7.5pt;
  color: var(--foreground);
  margin-bottom: 1mm;
}
.stat-item label {
  font-weight: 500;
  font-size: 7pt;
  color: var(--muted);
  white-space: nowrap;
}
.stat-item .field {
  border-bottom: 0.5px solid var(--border);
  min-width: 16mm;
  height: 4.5mm;
  display: inline-block;
  flex: 1;
}

/* ─── Notes ─── */
.notes-section { margin-top: var(--s3); }

/* ─── Footer ─── */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: var(--s3);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.footer-brand {
  font-family: var(--font-mono);
  font-size: 6pt;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.footer-page {
  font-family: var(--font-mono);
  font-size: 6.5pt;
  color: var(--muted);
}
</style>
</head>

<div class="page">
