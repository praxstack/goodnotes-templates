<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_base.css" />
  <style>
    /* ═══════════════════════════════════════════════
       Meeting Notes — template-specific styles
       ═══════════════════════════════════════════════ */

    /* ─── Info strip (2 rows of fields) ─── */
    .info-strip {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr;
      gap: 1.5mm 4mm;
      align-items: center;
      padding: var(--s2) 0;
      border-bottom: 0.3px solid var(--border);
      margin-bottom: var(--s3);
      flex-shrink: 0;
      font-size: 7.5pt;
      color: var(--muted-foreground);
    }
    .info-strip label {
      font-weight: 500;
      white-space: nowrap;
    }
    .info-strip .field {
      border-bottom: 0.5px solid var(--border);
      min-width: 18mm;
      height: 4.5mm;
      display: block;
    }

    /* ─── Attendees 2-column list ─── */
    .attendees-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5mm var(--s4);
    }
    .attendee-line {
      border-bottom: 0.5px dotted var(--input);
      height: 5mm;
    }

    /* ─── Agenda numbered items ─── */
    .agenda-card {
      margin-bottom: var(--s2);
      flex-shrink: 0;
    }
    .agenda-item {
      display: flex;
      align-items: center;
      gap: 2mm;
      margin-bottom: 1mm;
      font-size: 7pt;
    }
    .agenda-num {
      font-family: var(--font-mono);
      font-size: 6pt;
      font-weight: 500;
      color: var(--blue);
      flex-shrink: 0;
      width: 4mm;
      text-align: right;
    }
    .agenda-line {
      border-bottom: 0.5px dotted var(--input);
      flex: 1;
      height: 4.5mm;
    }

    /* ─── Notes section (main body) ─── */
    .notes-section {
      flex: 1;
      min-height: 0;
      margin-bottom: var(--s2);
    }
    .notes-lines {
      display: flex;
      flex-direction: column;
    }
    .note-line {
      border-bottom: 0.5px dotted var(--input);
      height: 5.5mm;
    }

    /* ─── Action Items table ─── */
    .action-card {
      flex-shrink: 0;
      margin-bottom: var(--s2);
    }
    .action-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 7pt;
    }
    .action-table thead th {
      background: var(--foreground);
      color: var(--background);
      font-weight: 600;
      padding: 1.5mm 2mm;
      text-align: left;
      font-size: 6pt;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .action-table thead th:first-child {
      border-radius: 1.5mm 0 0 1.5mm;
      width: 4.5mm;
      text-align: center;
    }
    .action-table thead th:nth-child(2) {
      width: 52%;
    }
    .action-table thead th:nth-child(3) {
      width: 24%;
    }
    .action-table thead th:last-child {
      border-radius: 0 1.5mm 1.5mm 0;
      width: 20%;
    }
    .action-table tbody td {
      padding: 1.5mm 2mm;
      border-bottom: 0.3px dotted var(--input);
      vertical-align: middle;
    }
    .action-table tbody td:first-child {
      text-align: center;
    }
    .action-table tbody tr:nth-child(even) {
      background: var(--card);
    }
    .action-cb {
      width: 3.5mm;
      height: 3.5mm;
      border: 0.5px solid var(--border);
      border-radius: 0.7mm;
      display: inline-block;
      background: var(--background);
    }
    .action-table tbody tr:nth-child(even) .action-cb {
      background: var(--card);
    }
    .action-field {
      border-bottom: 0.5px dotted var(--input);
      display: inline-block;
      width: 90%;
      height: 3.5mm;
    }

    /* ─── Key Decisions ─── */
    .decisions-section {
      flex-shrink: 0;
      margin-bottom: var(--s2);
    }
    .decision-line {
      border-bottom: 0.5px dotted var(--input);
      height: 5mm;
      margin-bottom: 1mm;
    }

    /* ─── Next Meeting row ─── */
    .next-meeting-row {
      display: flex;
      align-items: center;
      gap: 3mm;
      font-size: 7.5pt;
      color: var(--foreground-secondary);
      flex-shrink: 0;
      margin-bottom: var(--s2);
    }
    .next-meeting-row label {
      font-weight: 600;
      white-space: nowrap;
      font-size: 7pt;
    }
    .next-meeting-row .field-line {
      flex: 1;
      height: 4.5mm;
      border-bottom: 0.5px dotted var(--input);
      display: block;
    }

    /* ─── Footer ─── */
    .meeting-footer {
      display: flex;
      justify-content: space-between;
      gap: var(--s4);
      font-size: 6.5pt;
      color: var(--muted-foreground);
      border-top: 0.3px solid var(--border);
      padding-top: var(--s2);
      flex-shrink: 0;
    }
    .meeting-footer .footer-item {
      display: flex;
      align-items: center;
      gap: 2mm;
    }
    .meeting-footer label {
      font-weight: 500;
      white-space: nowrap;
    }
    .meeting-footer .footer-field {
      border-bottom: 0.5px solid var(--border);
      min-width: 30mm;
      height: 4mm;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- ══════════════════════════════════════════════════════════
         1. HEADER
         ══════════════════════════════════════════════════════════ -->
    <header class="page-header">
      <div>
        <div class="page-title">Meeting Notes</div>
      </div>
    </header>

    <!-- ══════════════════════════════════════════════════════════
         2. INFO STRIP (2 rows × 2 fields each)
         ══════════════════════════════════════════════════════════ -->
    <div class="info-strip">
      <label>Meeting:</label><span class="field"></span>
      <label>Date:</label><span class="field"></span>
      <label>Time:</label><span class="field"></span>
      <label>Location:</label><span class="field"></span>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         3. ATTENDEES
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label no-top">
      <span class="section-dot blue"></span>
      <span class="section-title">Attendees</span>
    </div>
    <div class="attendees-grid">
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
      <div class="attendee-line"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         4. AGENDA (blue-soft card)
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <span class="section-dot blue"></span>
      <span class="section-title">Agenda</span>
    </div>
    <div class="card blue-soft agenda-card">
      <div class="agenda-item">
        <span class="agenda-num">1.</span><span class="agenda-line"></span>
      </div>
      <div class="agenda-item">
        <span class="agenda-num">2.</span><span class="agenda-line"></span>
      </div>
      <div class="agenda-item">
        <span class="agenda-num">3.</span><span class="agenda-line"></span>
      </div>
      <div class="agenda-item">
        <span class="agenda-num">4.</span><span class="agenda-line"></span>
      </div>
      <div class="agenda-item">
        <span class="agenda-num">5.</span><span class="agenda-line"></span>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         5. NOTES (main section — takes most space)
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <span class="section-dot"></span>
      <span class="section-title">Notes</span>
    </div>
    <div class="notes-section">
      <div class="notes-lines">
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
        <div class="note-line"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         6. ACTION ITEMS (accent-soft card with table)
         ══════════════════════════════════════════════════════════ -->
    <div class="section-label">
      <span class="section-dot"></span>
      <span class="section-title">Action Items</span>
    </div>
    <div class="card accent-soft action-card">
      <table class="action-table">
        <thead>
          <tr>
            <th>✓</th>
            <th>Action</th>
            <th>Owner</th>
            <th>Due Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="action-cb"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
          </tr>
          <tr>
            <td><span class="action-cb"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
          </tr>
          <tr>
            <td><span class="action-cb"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
          </tr>
          <tr>
            <td><span class="action-cb"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
          </tr>
          <tr>
            <td><span class="action-cb"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
            <td><span class="action-field"></span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         7. KEY DECISIONS
         ══════════════════════════════════════════════════════════ -->
    <div class="decisions-section">
      <div class="section-label">
        <span class="section-dot amber"></span>
        <span class="section-title">Key Decisions</span>
      </div>
      <div class="decision-line"></div>
      <div class="decision-line"></div>
      <div class="decision-line"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         8. NEXT MEETING
         ══════════════════════════════════════════════════════════ -->
    <div class="next-meeting-row">
      <label>Next Meeting:</label>
      <span class="field-line"></span>
    </div>

    <!-- ══════════════════════════════════════════════════════════
         9. FOOTER
         ══════════════════════════════════════════════════════════ -->
    <footer class="meeting-footer">
      <div class="footer-item">
        <label>Prepared by:</label><span class="footer-field"></span>
      </div>
      <div class="footer-item">
        <label>Distributed to:</label><span class="footer-field"></span>
      </div>
    </footer>

  </div>

</body>
</html>
