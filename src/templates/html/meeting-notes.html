<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   MEETING NOTES v3 — Bubblegum Edition
   Design: Pop Retro meets Soft UI — pink/teal/gold
   Typography: Poppins (body) + Lora (headings) + Fira Code (mono)

   Creative direction:
   ✦ Pink-on-white cards with pop shadow (3px offset)
   ✦ Teal circle checks for attendees + action items
   ✦ Gold-tinted card for key decisions
   ✦ Pink-header numbered agenda table
   ✦ Dotted write lines at 6.5mm for stylus writing
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --foreground-secondary: #5b3050;
  --muted-foreground: #8b5070;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --accent: #d09030;
  --accent-soft: rgba(208, 144, 48, 0.12);
  --border: #d88ab0;
  --input: #e8c0d4;
  --dots: #d4a0c0;

  /* Bubblegum fonts */
  --font-sans: 'Poppins', sans-serif;
  --font-serif: 'Lora', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing */
  --s1: 1.5mm;
  --s2: 2.5mm;
  --s3: 4mm;
  --s4: 6mm;
  --s5: 8mm;

  /* Pop shadow — the bubblegum signature */
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --shadow-inset: inset 0 1px 2px rgba(192, 64, 138, 0.08);
  --radius: 6px;
  --radius-sm: 4px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 400;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Page Container ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 30px rgba(192, 64, 138, 0.15);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page { margin: 0; box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Shared: card ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1.5px solid var(--border);
}

/* ─── Shared: icon ─── */
.icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.icon svg { display: block; }

/* ─── Shared: dotted write line (6.5mm) ─── */
.write-line {
  border: none;
  border-bottom: 1.5px dotted var(--dots);
  height: 6.5mm;
}

/* ─── Section headers ─── */
.section-header {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
  flex-shrink: 0;
  padding-left: 1mm;
}
.section-bar {
  width: 3mm;
  height: 3mm;
  border-radius: 1mm;
  flex-shrink: 0;
}
.section-bar.pink   { background: var(--primary); }
.section-bar.teal   { background: var(--secondary); }
.section-bar.gold   { background: var(--accent); }
.section-title {
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--foreground);
}

/* ═══════════════════════════════════════
   1. HEADER — Bubblegum gradient + title
   ═══════════════════════════════════════ */
.header-gradient {
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 55%, var(--accent) 100%);
  border-radius: 3px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header-left .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.header-left .subtitle {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 6.5pt;
  color: var(--muted);
  margin-top: 0.5mm;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1.5mm;
  padding-top: 2mm;
}
.header-right .icon { color: var(--primary); }

/* ═══════════════════════════════════════
   2. INFO CARD — white card with pop shadow
   ═══════════════════════════════════════ */
.info-card {
  padding: var(--s3) var(--s4);
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.info-grid {
  display: grid;
  grid-template-columns: auto 1fr auto 1fr;
  gap: 2mm 4mm;
  align-items: center;
}

.info-label {
  font-family: var(--font-sans);
  font-size: 7pt;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted-foreground);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 1.5mm;
}
.info-label .icon { color: var(--primary); }

.info-field {
  border-bottom: 1.5px solid var(--border);
  height: 5mm;
  min-width: 16mm;
}

/* ═══════════════════════════════════════
   3. ATTENDEES — 2-column grid, teal checks
   ═══════════════════════════════════════ */
.attendees-section {
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.attendees-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5mm var(--s5);
  padding: 0 1mm;
}

.attendee-row {
  display: flex;
  align-items: center;
  gap: 2mm;
  height: 5.5mm;
}

.circle-check {
  width: 3.5mm;
  height: 3.5mm;
  border-radius: 50%;
  border: 1.5px solid var(--secondary);
  flex-shrink: 0;
}

.attendee-line {
  flex: 1;
  border-bottom: 1.5px dotted var(--dots);
  height: 4.5mm;
}

/* ═══════════════════════════════════════
   4. AGENDA — pink-header numbered table
   ═══════════════════════════════════════ */
.agenda-section {
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.agenda-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 7.5pt;
}

.agenda-table thead th {
  background: var(--primary);
  color: #ffffff;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 6.5pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2mm 3mm;
  text-align: left;
}
.agenda-table thead th:first-child {
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  width: 8mm;
  text-align: center;
}
.agenda-table thead th:last-child {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.agenda-table tbody td {
  padding: 1.5mm 3mm;
  border-bottom: 1px dotted var(--input);
  height: 6mm;
  vertical-align: middle;
}
.agenda-table tbody td:first-child {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 7pt;
  font-weight: 500;
  color: var(--primary);
}
.agenda-table tbody tr:nth-child(even) {
  background: rgba(246, 230, 238, 0.4);
}

/* ═══════════════════════════════════════
   5. NOTES — dotted write lines (6.5mm)
   ═══════════════════════════════════════ */
.notes-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-bottom: var(--s3);
  min-height: 0;
}

.notes-lines {
  display: flex;
  flex-direction: column;
  flex: 1;
}

.note-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 6.5mm;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   6. ACTION ITEMS — table with circle checks
   ═══════════════════════════════════════ */
.actions-section {
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.actions-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 7.5pt;
}

.actions-table thead th {
  background: var(--secondary);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 6.5pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2mm 3mm;
  text-align: left;
}
.actions-table thead th:first-child {
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  width: 7mm;
  text-align: center;
}
.actions-table thead th:nth-child(2) { width: 48%; }
.actions-table thead th:nth-child(3) { width: 22%; }
.actions-table thead th:last-child {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  width: 22%;
}

.actions-table tbody td {
  padding: 1.5mm 3mm;
  border-bottom: 1px dotted var(--input);
  height: 6mm;
  vertical-align: middle;
}
.actions-table tbody td:first-child { text-align: center; }
.actions-table tbody tr:nth-child(even) {
  background: rgba(138, 207, 209, 0.06);
}

.action-circle-check {
  width: 3.5mm;
  height: 3.5mm;
  border-radius: 50%;
  border: 1.5px solid var(--secondary);
  display: inline-block;
}

/* ═══════════════════════════════════════
   7. KEY DECISIONS — gold-tinted card
   ═══════════════════════════════════════ */
.decisions-card {
  background: var(--card-alt);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1.5px solid rgba(208, 144, 48, 0.3);
  padding: var(--s3) var(--s4);
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.decisions-card .section-header {
  margin-bottom: var(--s2);
  padding-left: 0;
}

.decision-line {
  border-bottom: 1.5px dotted rgba(208, 144, 48, 0.4);
  height: 6mm;
  margin-bottom: 0.5mm;
}

/* ═══════════════════════════════════════
   8. NEXT MEETING + FOOTER
   ═══════════════════════════════════════ */
.next-meeting {
  display: flex;
  align-items: center;
  gap: 2.5mm;
  margin-bottom: var(--s3);
  flex-shrink: 0;
  padding: 0 1mm;
}

.next-meeting .label {
  font-family: var(--font-sans);
  font-size: 7.5pt;
  font-weight: 600;
  color: var(--foreground-secondary);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 1.5mm;
}
.next-meeting .label .icon { color: var(--secondary); }

.next-meeting .nm-field {
  flex: 1;
  border-bottom: 1.5px solid var(--border);
  height: 5mm;
}

.footer {
  border-top: 1px solid var(--border);
  padding-top: var(--s2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.footer-quote {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 6.5pt;
  color: var(--muted);
  letter-spacing: 0.01em;
}

.footer-page {
  font-family: var(--font-sans);
  font-size: 6.5pt;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.05em;
}
</style>
</head>

    <div class="header-right">

          <td><span class="action-circle-check"></span></td>
          <td></td><td></td><td></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ═══════════════════════════════════════
       7. KEY DECISIONS — gold-tinted card
       ═══════════════════════════════════════ -->
  <div class="decisions-card">
    <div class="section-header">
      <div class="section-bar gold"></div>
      <span class="section-title">Key Decisions</span>
      <span class="icon" style="color: var(--accent); margin-left: auto;">
        <!-- Star/gavel icon 14×14 -->
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="7,1.5 8.5,5 12.5,5.3 9.5,7.8 10.5,11.8 7,9.5 3.5,11.8 4.5,7.8 1.5,5.3 5.5,5"/>
        </svg>
      </span>
    </div>
    <div class="decision-line"></div>
    <div class="decision-line"></div>
    <div class="decision-line"></div>
  </div>

  <!-- ═══════════════════════════════════════
       8. NEXT MEETING + FOOTER
       ═══════════════════════════════════════ -->
  <div class="next-meeting">
    <span class="label">
      <span class="icon">
        <!-- Calendar-forward icon 12×12 -->
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="2.5" width="10" height="8" rx="1.2"/>
          <line x1="1" y1="5" x2="11" y2="5"/>
          <line x1="4" y1="0.8" x2="4" y2="3.5"/>
          <line x1="8" y1="0.8" x2="8" y2="3.5"/>
          <polyline points="6,7.5 8,8.5 6,9.5"/>
        </svg>
      </span>
      Next Meeting:
    </span>
    <div class="nm-field"></div>
  </div>

  <footer class="footer">
    <span class="footer-quote">"Great meetings start with great notes."</span>
    <span class="footer-page">Meeting Notes — Bubblegum Edition</span>
  </footer>

</div>

</body>
