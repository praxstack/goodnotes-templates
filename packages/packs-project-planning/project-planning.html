<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Planning — Bubblegum Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   PROJECT PLANNING v3 — Bubblegum Edition
   Design: Pop Retro + Soft UI — pink/teal/gold
   Typography: Poppins + Lora + Fira Code

   ✦ Header gradient bar (pink→teal→gold)
   ✦ Project Overview card with status field
   ✦ Numbered objectives with circle checks
   ✦ Milestones/Tasks table with pink header (8 rows)
   ✦ Risks & Dependencies side-by-side (teal / gold)
   ✦ Notes section with write lines
   ✦ Footer with inspirational quote
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --foreground-secondary: #5b3050;
  --muted-foreground: #8b5070;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --muted: #d4a0c0;
  --muted-bg: #f8d8ea;
  --accent: #d09030;
  --accent-soft: rgba(208, 144, 48, 0.12);
  --border: #d88ab0;
  --input: #e8c0d4;
  --dots: #d4a0c0;

  /* Pop shadow — the bubblegum signature */
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --radius: 6px;
  --radius-sm: 4px;

  /* Typography */
  --font-sans: 'Poppins', sans-serif;
  --font-serif: 'Lora', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing scale */
  --s1: 1.5mm;
  --s2: 2.5mm;
  --s3: 4mm;
  --s4: 6mm;
  --s5: 8mm;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 7.5pt;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Page Container (A4) ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 30px rgba(192, 64, 138, 0.15);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  .page {
    margin: 0; box-shadow: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Shared primitives ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1.5px solid var(--border);
}
.icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.icon svg { display: block; }

/* 6.5 mm write lines */
.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 6.5mm;
}

/* ═══════════════════════════════════════
   SECTION 1: HEADER
   ═══════════════════════════════════════ */
.header-gradient {
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--primary) 0%, #e670ab 25%, var(--secondary) 60%, var(--accent) 100%);
  border-radius: 3px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header-left .title {
  font-family: var(--font-serif);
  font-size: 18pt;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.1;
}

.header-left .subtitle {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 6.5pt;
  color: var(--muted);
  margin-top: 0.5mm;
}

.date-card {
  padding: var(--s2) var(--s3);
  display: flex;
  align-items: center;
  gap: 2mm;
}

.date-label {
  font-size: 6.5pt;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-foreground);
}

.date-field {
  border-bottom: 1.5px solid var(--border);
  min-width: 26mm;
  height: 4.5mm;
}

/* ─── Section headers ─── */
.section-header {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
  flex-shrink: 0;
}

.section-bar {
  width: 3mm;
  height: 3mm;
  border-radius: 1mm;
  flex-shrink: 0;
}

.section-title {
  font-size: 7pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--foreground);
}

/* ═══════════════════════════════════════
   SECTION 2: PROJECT OVERVIEW CARD
   ═══════════════════════════════════════ */
.overview-card {
  padding: var(--s3);
  margin-bottom: var(--s3);
  flex-shrink: 0;
  border-left: 4px solid var(--primary);
  background: linear-gradient(135deg, var(--card) 0%, rgba(192, 64, 138, 0.04) 100%);
}

.overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s2) var(--s4);
}

.overview-item {
  display: flex;
  align-items: center;
  gap: 2mm;
}

.overview-item.full {
  grid-column: 1 / -1;
}

.overview-label {
  font-size: 6.5pt;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.overview-val {
  border-bottom: 1.5px solid var(--border);
  height: 5mm;
  flex: 1;
  min-width: 20mm;
}

.overview-val.wide {
  min-width: 40mm;
}

/* ═══════════════════════════════════════
   SECTION 3: OBJECTIVES
   ═══════════════════════════════════════ */
.objectives-list {
  list-style: none;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.obj-item {
  display: flex;
  align-items: center;
  gap: 2.5mm;
  padding: 1.5mm 0;
  border-bottom: 1px dotted var(--dots);
}

.obj-item:last-child {
  border-bottom: none;
}

.obj-num {
  width: 5.5mm;
  height: 5.5mm;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 5.5pt;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.obj-check {
  width: 4mm;
  height: 4mm;
  border-radius: 50%;
  border: 1.5px solid var(--primary-light);
  flex-shrink: 0;
}

.obj-line {
  flex: 1;
  border-bottom: 1.5px dotted var(--dots);
  height: 5mm;
}

/* ═══════════════════════════════════════
   SECTION 4: MILESTONES / TASKS TABLE
   ═══════════════════════════════════════ */
.tasks-card {
  padding: var(--s2) var(--s3);
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.tasks-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 6.5pt;
}

.tasks-table th {
  background: var(--primary);
  color: #fff;
  font-weight: 600;
  font-size: 5.5pt;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 1.5mm 2mm;
  text-align: center;
}

.tasks-table th:first-child {
  text-align: left;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
}

.tasks-table th:last-child {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.tasks-table td {
  padding: 1.2mm 2mm;
  text-align: center;
  border-bottom: 1px dotted var(--dots);
  height: 6.5mm;
}

.tasks-table td:first-child {
  text-align: left;
  color: var(--foreground-secondary);
}

.tasks-table tr:nth-child(even) td {
  background: var(--card-alt);
}

.col-task     { width: 34%; }
.col-owner    { width: 18%; }
.col-due      { width: 16%; }
.col-status   { width: 16%; }
.col-priority { width: 16%; }

.status-circle {
  width: 3.5mm;
  height: 3.5mm;
  border-radius: 50%;
  border: 1.5px solid var(--primary);
  display: inline-block;
}

/* ═══════════════════════════════════════
   SECTION 5: RISKS & DEPENDENCIES
   ═══════════════════════════════════════ */
.risk-dep-cols {
  display: flex;
  gap: var(--s2);
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.rd-card {
  flex: 1;
  padding: var(--s2) var(--s3);
}

.rd-card.teal {
  background: rgba(138, 207, 209, 0.10);
  border-color: rgba(138, 207, 209, 0.35);
}

.rd-card.gold {
  background: var(--accent-soft);
  border-color: rgba(208, 144, 48, 0.25);
}

.rd-header {
  display: flex;
  align-items: center;
  gap: 2mm;
  margin-bottom: var(--s2);
}

.rd-title {
  font-size: 6.5pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.teal .rd-title { color: #5b9fa0; }
.gold .rd-title { color: var(--accent); }

.rd-row {
  display: flex;
  align-items: center;
  gap: 2mm;
  height: 6.5mm;
}

.rd-check {
  width: 3.5mm;
  height: 3.5mm;
  border-radius: 50%;
  flex-shrink: 0;
}

.teal .rd-check { border: 1.5px solid var(--secondary); }
.gold .rd-check { border: 1.5px solid var(--accent); }

.rd-line {
  flex: 1;
  border-bottom: 1.5px dotted var(--dots);
  height: 4.5mm;
}

/* ═══════════════════════════════════════
   SECTION 6: NOTES
   ═══════════════════════════════════════ */
.notes-section {
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   SECTION 7: FOOTER
   ═══════════════════════════════════════ */
.footer {
  border-top: 1.5px solid var(--border);
  padding-top: var(--s2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  margin-top: auto;
}

.footer-quote {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 6.5pt;
  color: var(--muted-foreground);
}

.footer .page-num {
  font-size: 6pt;
  color: var(--muted);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="page">

  <!-- ═══════════════════════════════════════
       1. HEADER — gradient bar + title + date
       ═══════════════════════════════════════ -->
  <div class="header-gradient" aria-hidden="true"></div>

  <div class="header">
    <div class="header-left">
      <div class="title">Project Planning</div>
      <div class="subtitle">Plan the work. Work the plan.</div>
    </div>
    <div class="date-card card">
      <span class="icon" style="color: var(--primary);">
        <!-- Calendar icon 14×14 -->
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1.5" y="2.5" width="11" height="10" rx="1.5"/>
          <line x1="1.5" y1="5.5" x2="12.5" y2="5.5"/>
          <line x1="4.5" y1="1" x2="4.5" y2="4"/>
          <line x1="9.5" y1="1" x2="9.5" y2="4"/>
        </svg>
      </span>
      <span class="date-label">Date</span>
      <span class="date-field"></span>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       2. PROJECT OVERVIEW CARD
       ═══════════════════════════════════════ -->
  <div class="section-header">
    <div class="section-bar" style="background: var(--primary);"></div>
    <span class="icon" style="color: var(--primary);">
      <!-- Clipboard icon 14×14 -->
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="10" height="10" rx="1.5"/>
        <path d="M5 3V2a2 2 0 0 1 4 0v1"/>
      </svg>
    </span>
    <span class="section-title">Project Overview</span>
  </div>

  <div class="overview-card card">
    <div class="overview-grid">
      <div class="overview-item full">
        <span class="overview-label">Project Name:</span>
        <span class="overview-val wide"></span>
      </div>
      <div class="overview-item full">
        <span class="overview-label">Owner:</span>
        <span class="overview-val wide"></span>
      </div>
      <div class="overview-item">
        <span class="overview-label">Start Date:</span>
        <span class="overview-val"></span>
      </div>
      <div class="overview-item">
        <span class="overview-label">End Date:</span>
        <span class="overview-val"></span>
      </div>
      <div class="overview-item full">
        <span class="overview-label">Status:</span>
        <span class="overview-val"></span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       3. OBJECTIVES (3 numbered + circle checks)
       ═══════════════════════════════════════ -->
  <div class="section-header">
    <div class="section-bar" style="background: var(--secondary);"></div>
    <span class="icon" style="color: var(--secondary);">
      <!-- Target icon 14×14 -->
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="7" r="5.5"/>
        <circle cx="7" cy="7" r="3"/>
        <circle cx="7" cy="7" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </span>
    <span class="section-title">Objectives</span>
  </div>

  <ul class="objectives-list">
    <li class="obj-item">
      <span class="obj-num">1</span>
      <span class="obj-check"></span>
      <span class="obj-line"></span>
    </li>
    <li class="obj-item">
      <span class="obj-num">2</span>
      <span class="obj-check"></span>
      <span class="obj-line"></span>
    </li>
    <li class="obj-item">
      <span class="obj-num">3</span>
      <span class="obj-check"></span>
      <span class="obj-line"></span>
    </li>
  </ul>

  <!-- ═══════════════════════════════════════
       4. MILESTONES / TASKS TABLE (8 rows)
       ═══════════════════════════════════════ -->
  <div class="section-header">
    <div class="section-bar" style="background: var(--accent);"></div>
    <span class="icon" style="color: var(--accent);">
      <!-- Flag icon 12×12 -->
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 10V2"/>
        <path d="M2 2h6l-2 2.5L8 7H2"/>
      </svg>
    </span>
    <span class="section-title">Milestones &amp; Tasks</span>
  </div>

  <div class="tasks-card card">
    <table class="tasks-table">
      <thead>
        <tr>
          <th class="col-task">Task</th>
          <th class="col-owner">Owner</th>
          <th class="col-due">Due Date</th>
          <th class="col-status">Status</th>
          <th class="col-priority">Priority</th>
        </tr>
      </thead>
      <tbody>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
        <tr><td></td><td></td><td></td><td><span class="status-circle"></span></td><td></td></tr>
      </tbody>
    </table>
  </div>

  <!-- ═══════════════════════════════════════
       5. RISKS & DEPENDENCIES (side-by-side)
       ═══════════════════════════════════════ -->
  <div class="risk-dep-cols">
    <!-- Risks — teal card -->
    <div class="rd-card card teal">
      <div class="rd-header">
        <span class="icon" style="color: #5b9fa0;">
          <!-- Warning / alert icon 12×12 -->
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 1l5 9H1z"/>
            <line x1="6" y1="5" x2="6" y2="7"/>
            <circle cx="6" cy="8.8" r="0.4" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span class="rd-title">Risks</span>
      </div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
    </div>

    <!-- Dependencies — gold card -->
    <div class="rd-card card gold">
      <div class="rd-header">
        <span class="icon" style="color: var(--accent);">
          <!-- Link / chain icon 12×12 -->
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 7l2-2"/>
            <path d="M3.5 6.5L2.3 7.7a2 2 0 0 0 2.8 2.8L6.5 9"/>
            <path d="M8.5 5.5l1.2-1.2a2 2 0 0 0-2.8-2.8L5.5 3"/>
          </svg>
        </span>
        <span class="rd-title">Dependencies</span>
      </div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
      <div class="rd-row"><span class="rd-check"></span><span class="rd-line"></span></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       6. NOTES (3 write lines)
       ═══════════════════════════════════════ -->
  <div class="section-header">
    <div class="section-bar" style="background: var(--muted);"></div>
    <span class="icon" style="color: var(--muted-foreground);">
      <!-- Pencil / edit icon 12×12 -->
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.5 1.5l2 2L4 10H2v-2z"/>
        <path d="M7 3l2 2"/>
      </svg>
    </span>
    <span class="section-title">Notes</span>
  </div>

  <div class="notes-section">
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
  </div>

  <!-- ═══════════════════════════════════════
       7. FOOTER
       ═══════════════════════════════════════ -->
  <div class="footer">
    <span class="footer-quote">"Plans are nothing; planning is everything." — Dwight D. Eisenhower</span>
    <span class="page-num" data-inject="page-num"></span>
  </div>

</div>

</body>
</html>
