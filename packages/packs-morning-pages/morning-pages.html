<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Pages — Bubblegum v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   MORNING PAGES v3 — Bubblegum Edition
   Design: Pop Retro meets Soft UI — playful pink + teal
   Typography: Poppins (body) + Lora (headings) + Fira Code (mono)

   Creative direction:
   ✦ Pink-on-white header with pop shadow
   ✦ Bubblegum gradient bar across the top
   ✦ 25+ dotted write lines (6.5mm) for stream-of-consciousness
   ✦ Footer quote about writing
   ═══════════════════════════════════════════════════════ */

/* ─── Design Tokens ─── */
:root {
  --page-w: 210mm;
  --page-h: 297mm;
  --margin: 12mm;

  /* Bubblegum palette */
  --background: #f6e6ee;
  --foreground: #3d2040;
  --card: #ffffff;
  --card-alt: #fef3d6;
  --foreground-secondary: #5b3050;
  --muted-foreground: #8b5070;
  --primary: #c0408a;
  --primary-light: #e670abCC;
  --secondary: #8acfd1;
  --accent: #d09030;
  --accent-soft: rgba(208, 144, 48, 0.12);
  --border: #d88ab0;
  --input: #e8c0d4;
  --dots: #d4a0c0;
  --muted: #d4a0c0;

  /* Bubblegum fonts */
  --font-sans: 'Poppins', sans-serif;
  --font-serif: 'Lora', serif;
  --font-mono: 'Fira Code', monospace;

  /* Spacing scale */
  --s1: 1.5mm; --s2: 2.5mm; --s3: 4mm; --s4: 6mm; --s5: 8mm;

  /* Pop shadow — the bubblegum signature */
  --shadow-card: 3px 3px 0px 0px hsl(326 58% 57% / 0.3);
  --shadow-inset: inset 0 1px 2px rgba(192, 64, 138, 0.08);
  --radius: 6px;
  --radius-sm: 4px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e8c0d4;
  font-family: var(--font-sans);
  font-size: 7.5pt;
  color: var(--foreground);
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Page Container ─── */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--background);
  margin: 10mm auto;
  padding: var(--margin);
  overflow: hidden;
  box-shadow: 0 4px 30px rgba(192, 64, 138, 0.15);
  page-break-after: always;
  display: flex;
  flex-direction: column;
}

/* ─── Print Styles ─── */
@media print {
  body { background: white; }
  .page {
    margin: 0; box-shadow: none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @page { size: A4 portrait; margin: 0; }
}

/* ─── Card Base ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1.5px solid var(--border);
}

/* ─── Inline SVG icon base ─── */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon svg { display: block; }

/* ═══════════════════════════════════════
   HEADER — Bubblegum signature gradient
   ═══════════════════════════════════════ */
.header-gradient {
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--primary) 0%, #e670ab 30%, var(--secondary) 60%, #d09030 100%);
  border-radius: 3px;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--s3);
  flex-shrink: 0;
}

.header-left .title {
  font-family: var(--font-serif);
  font-size: 20pt;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.header-left .subtitle {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 6.5pt;
  color: var(--muted);
  margin-top: 0.5mm;
}

/* ─── Date Card ─── */
.date-card {
  padding: var(--s2) var(--s3);
  display: flex;
  align-items: center;
  gap: var(--s3);
}

.date-group {
  display: flex;
  align-items: center;
  gap: 1.5mm;
}

.date-label {
  font-size: 6.5pt;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-foreground);
}

.date-field {
  border-bottom: 1.5px solid var(--border);
  min-width: 22mm;
  height: 4.5mm;
}

/* ═══════════════════════════════════════
   FREEWRITING LINES — 6.5mm dotted
   ═══════════════════════════════════════ */
.freewrite-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  margin-top: var(--s3);
}

.write-line {
  border-bottom: 1.5px dotted var(--dots);
  height: 6.5mm;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   FOOTER QUOTE
   ═══════════════════════════════════════ */
.quote-footer {
  margin-top: auto;
  padding-top: var(--s3);
  border-top: 1px solid var(--border);
  text-align: center;
  flex-shrink: 0;
}

.quote-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 7pt;
  color: var(--muted-foreground);
  line-height: 1.45;
}

.quote-author {
  font-family: var(--font-sans);
  font-size: 6pt;
  font-weight: 600;
  color: var(--muted);
  margin-top: 1mm;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div class="page">

  <!-- ─── 1. Header Gradient Bar ─── -->
  <div class="header-gradient" aria-hidden="true"></div>

  <!-- ─── 2. Header ─── -->
  <div class="header">
    <div class="header-left">
      <div class="title">Morning Pages</div>
      <div class="subtitle">Clear your mind. Write without stopping.</div>
    </div>
    <span class="icon" style="color: var(--primary); margin-top: 2mm;">
      <!-- Pen / feather icon 20×20 -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
        <line x1="16" y1="8" x2="2" y2="22"/>
        <line x1="17.5" y1="15" x2="9" y2="15"/>
      </svg>
    </span>
  </div>

  <!-- ─── 3. Date Card ─── -->
  <div class="date-card card">
    <div class="date-group">
      <span class="icon" style="color: var(--primary);">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="date-label">Date</span>
      <span class="date-field"></span>
    </div>
    <div class="date-group">
      <span class="date-label">Day</span>
      <span class="date-field" style="min-width: 18mm;"></span>
    </div>
  </div>

  <!-- ─── 4. Freewriting Lines (28 lines × 6.5mm) ─── -->
  <div class="freewrite-area">
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
    <div class="write-line"></div>
  </div>

  <!-- ─── 5. Footer Quote ─── -->
  <div class="quote-footer">
    <div class="quote-text">"Once we get those muddy, maddening, confusing thoughts on the page, we face our day with clearer eyes."</div>
    <div class="quote-author">— Julia Cameron</div>
  </div>

</div>

</body>
</html>
